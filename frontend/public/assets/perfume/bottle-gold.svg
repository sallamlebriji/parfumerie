<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" role="img" aria-labelledby="title desc">
  <title id="title">Flacon de parfum dore</title>
  <desc id="desc">Un flacon luxueux aux reflets ambres.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7efe2"/>
      <stop offset=".54" stop-color="#d8b87e"/>
      <stop offset="1" stop-color="#18251f"/>
    </linearGradient>
    <linearGradient id="bottle" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".8"/>
      <stop offset=".42" stop-color="#f3ca75" stop-opacity=".56"/>
      <stop offset="1" stop-color="#241915" stop-opacity=".38"/>
    </linearGradient>
    <linearGradient id="juice" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8cf75"/>
      <stop offset=".68" stop-color="#a4612e"/>
      <stop offset="1" stop-color="#352018"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="42" stdDeviation="34" flood-color="#0b0b0f" flood-opacity=".34"/>
    </filter>
  </defs>
  <rect width="900" height="1100" fill="url(#bg)"/>
  <circle cx="704" cy="248" r="245" fill="#fff9ea" opacity=".3"/>
  <circle cx="212" cy="850" r="250" fill="#07120f" opacity=".2"/>
  <g filter="url(#shadow)">
    <rect x="250" y="260" width="400" height="620" rx="88" fill="url(#bottle)" stroke="#fff7df" stroke-opacity=".6" stroke-width="5"/>
    <rect x="326" y="406" width="248" height="328" rx="42" fill="url(#juice)" opacity=".95"/>
    <rect x="352" y="129" width="196" height="132" rx="35" fill="#d7b56d"/>
    <rect x="308" y="84" width="284" height="66" rx="18" fill="#fff7df"/>
    <rect x="345" y="510" width="210" height="132" rx="28" fill="#fffaf0" opacity=".9"/>
    <path d="M377 558h146M405 602h89" stroke="#1f1714" stroke-width="15" stroke-linecap="round" opacity=".72"/>
  </g>
