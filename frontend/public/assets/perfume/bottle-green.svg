<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1100" role="img" aria-labelledby="title desc">
  <title id="title">Parfum vert moderne</title>
  <desc id="desc">Flacon moderne sur fond vert profond.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef5ec"/>
      <stop offset=".48" stop-color="#7b9a82"/>
      <stop offset="1" stop-color="#07120f"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".72"/>
      <stop offset=".5" stop-color="#cfe1bf" stop-opacity=".44"/>
      <stop offset="1" stop-color="#07120f" stop-opacity=".34"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-20%" width="160%" height="150%">
      <feDropShadow dx="0" dy="42" stdDeviation="34" flood-color="#07120f" flood-opacity=".38"/>
    </filter>
  </defs>
  <rect width="900" height="1100" fill="url(#bg)"/>
  <circle cx="694" cy="288" r="220" fill="#fff8df" opacity=".2"/>
  <circle cx="214" cy="804" r="260" fill="#0f2420" opacity=".18"/>
