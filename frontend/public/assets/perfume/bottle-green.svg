    <rect x="328" y="435" width="244" height="268" rx="32" fill="#213d35" opacity=".82"/>
    <rect x="364" y="172" width="172" height="128" rx="30" fill="#d7b56d"/>
    <rect x="316" y="122" width="268" height="68" rx="18" fill="#fff8df"/>
    <rect x="355" y="528" width="190" height="110" rx="20" fill="#fff8df" opacity=".88"/>
    <path d="M386 570h129M408 606h84" stroke="#20352f" stroke-width="13" stroke-linecap="round" opacity=".72"/>
  </g>
